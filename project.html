<!-- 課題1-4: プロジェクト課題の検索結果を表示する HTML をここに記述してください．-->

<!-- 番組開始時刻・終了事項、チャンネル、番組名、番組サブタイトル、番組説明文、出演者 
                <li>開始時刻：年月日時分</li>
                <li>終了時刻：年月日時分</li>
                <li>チャンネル：</li>
                <li>タイトル：</li>
                <li>サブタイトル：</li>
                <li>番組説明：</li>
                <li>出演者：</li>
-->

<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="project.css">
        <script src="https://cdnjs.cloudflare.com/ajax/libs/axios/0.27.2/axios.min.js"></script>
        <script src="tv-program.js" defer></script>
        <title>NHK の番組表</title>
    </head>
    <body>
        <header>
            <div class="head-list">
                <div class="container">
                    <a href="project.html" class="header-logo">NHKの番組表</a>
                    <div class="header-lists">
                        <ul>
                            <li class="serch"><a href="#serch">検索</a></li>
                        </ul>
                    </div>
                </div>
            </div>
        </header>
        <main>
                <div class="serch-list">
                    <h2 id="serch">番組の検索結果</h2>
                    <div class="channel-btn">
                        <label for="channel">チャンネル　</label>
                        <select name="channel" id="channel">
                            <option value="">-</option>
                            <option value="g1">NHK総合1</option>
                            <option value="e1">Eテレ1</option>
                        </select>
                    </div>
                    <div class="genre-btn">
                        <label for="genres">ジャンル　</label>
                        <select name="genres" id="genres">
                            <option value="">-</option>
                            <option value="0000">ニュース・報道</option>
                            <option value="0100">スポーツ</option>
                            <option value="0205">情報・ワイドショー</option>
                            <option value="0300">ドラマ</option>
                            <option value="0409">音楽</option>
                            <option value="0502">バラエティ</option>
                            <option value="0600">映画</option>
                            <option value="0700">アニメ</option>
                            <option value="0800">ドキュメンタリー・教養</option>
                            <option value="0903">劇場・公演</option>
                            <option value="1000">趣味・教育</option>
                            <option value="1100">福祉</option>
                        </select>
                    </div>
                    <button id="sendRequest">検索</button>
                </div>
                <div class="channels">
                    <span id="count"></span>
                </div>
        </main>
    </body>
</html>
